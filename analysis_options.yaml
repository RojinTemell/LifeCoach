include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"      # build_runner üretimi (freezed/injectable) - lint'lemeye gerek yok
    - "**/*.freezed.dart"
    - "**/*.config.dart"
  errors:
    # İhlalleri uyarı değil HATA yap → CI'da yakalanır, fark etmeden geçmez
    invalid_annotation_target: ignore

linter:
  rules:
    public_member_api_docs: false   